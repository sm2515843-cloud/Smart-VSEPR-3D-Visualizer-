 <!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate VSEPR 3D</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        #ui { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px; border: 1px solid #00f2fe; z-index: 100; width: 220px; font-size: 13px; }
        select { width: 100%; padding: 8px; background: #111; color: #00f2fe; border: 1px solid #00f2fe; border-radius: 5px; margin-top: 5px; }
        .info { margin-top: 10px; padding: 5px; border-bottom: 1px solid #333; }
        .val { color: #00f2fe; font-weight: bold; }
    </style>
</head>
<body>

<div id="ui">
    <div style="text-align:center; font-weight:bold; color:#00f2fe; margin-bottom:10px;">VSEPR VISUALIZER</div>
    اختر الشكل:
    <select id="mSel">
        <option value="AX2">AX2 - Linear (180°)</option>
        <option value="AX3">AX3 - Trigonal Planar</option>
        <option value="AX4">AX4 - Tetrahedral</option>
        <option value="AX2E2">AX2E2 - Bent (Water)</option>
        <option value="AX5">AX5 - Trigonal Bipyramidal</option>
        <option value="AX6">AX6 - Octahedral</option>
    </select>
    <div class="info">الشكل: <span id="sN" class="val">Linear</span></div>
    <div class="info">الزاوية: <span id="sA" class="val">180°</span></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>

<script>
    let scene, camera, renderer, group;

    const DATA = {
        "AX2": { n: "Linear", a: "180°", pos: [[2,0,0], [-2,0,0]], c: 0x00f2fe },
        "AX3": { n: "Trigonal Planar", a: "120°", pos: [[2,0,0], [-1,1.7,0], [-1,-1.7,0]], c: 0x39ff14 },
        "AX4": { n: "Tetrahedral", a: "109.5°", pos: [[0,2,0], [1.9,-0.6,0], [-0.9,-0.6,1.6], [-0.9,-0.6,-1.6]], c: 0xff00ff },
        "AX2E2": { n: "Bent", a: "104.5°", pos: [[1.5,-1.2,0], [-1.5,-1.2,0]], c: 0xff4500 },
        "AX5": { n: "Trigonal Bipyramidal", a: "90°, 120°", pos: [[0,2,0], [0,-2,0], [1.8,0,0], [-0.9,0,1.5], [-0.9,0,-1.5]], c: 0x00bfff },
        "AX6": { n: "Octahedral", a: "90°", pos: [[2,0,0], [-2,0,0], [0,2,0], [0,-2,0], [0,0,2], [0,0,-2]], c: 0xffffff }
    };

    function init() {
        if(typeof THREE === 'undefined') {
            alert("المتصفح يمنع تحميل المكتبة.. جربي متصفح Chrome");
            return;
        }
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const l = new THREE.PointLight(0xffffff, 1, 100); l.position.set(5,5,5); scene.add(l);
        scene.add(new THREE.AmbientLight(0x404040));

        group = new THREE.Group(); scene.add(group);
        camera.position.z = 7;
        update("AX2"); animate();
    }

    function update(v) {
        group.clear();
        const d = DATA[v];
        // ذرة مركزية
        group.add(new THREE.Mesh(new THREE.SphereGeometry(0.6, 32, 32), new THREE.MeshPhongMaterial({color: 0xffffff})));
        // ذرات فرعية
        d.pos.forEach(p => {
            const s = new THREE.Mesh(new THREE.SphereGeometry(0.4, 32, 32), new THREE.MeshPhongMaterial({color: d.c}));
            s.position.set(...p); group.add(s);
            // روابط
            const b = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, new THREE.Vector3(...p).length(), 12), new THREE.MeshPhongMaterial({color: 0x666666}));
            b.position.copy(new THREE.Vector3(...p).multiplyScalar(0.5));
            b.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), new THREE.Vector3(...p).normalize());
            group.add(b);
        });
        document.getElementById("sN").innerText = d.n;
        document.getElementById("sA").innerText = d.a;
    }
  document.getElementById("mSel").onchange = (e) => update(e.target.value);
    function animate() { requestAnimationFrame(animate); group.rotation.y += 0.01; renderer.render(scene, camera); }
    
    window.onload = init;
</script>
</body>
</html>
