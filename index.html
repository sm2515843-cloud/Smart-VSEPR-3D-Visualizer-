<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Smart VSEPR 3D - Ultimate Edition</title>
    <style>
        body { margin: 0; background: #050505; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #ui { position: absolute; top: 20px; left: 20px; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px); padding: 20px; border-radius: 15px; border: 1px solid #00f2fe; z-index: 100; width: 300px; box-shadow: 0 0 20px rgba(0, 242, 254, 0.3); }
        h2 { margin: 0 0 15px 0; font-size: 20px; text-align: center; color: #00f2fe; text-transform: uppercase; letter-spacing: 2px; }
        select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #00f2fe; background: #111; color: #fff; font-size: 14px; outline: none; cursor: pointer; }
        .info-box { margin-top: 15px; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 8px; border-left: 4px solid #00f2fe; }
        .label { color: #888; font-size: 12px; }
        .value { font-size: 16px; font-weight: bold; color: #00f2fe; display: block; margin-top: 2px; }
        #canvas-container { cursor: move; }
    </style>
</head>
<body>

<div id="ui">
    <h2>VSEPR PRO VISUALIZER</h2>
    <label style="font-size: 12px; opacity: 0.7;">اختر نوع التهجين / الشكل:</label>
    <select id="molSelect">
        <optgroup label="Linear (AX2)">
            <option value="AX2">AX2 - Linear (180°)</option>
        </optgroup>
        <optgroup label="Trigonal Planar (AX3)">
            <option value="AX3">AX3 - Trigonal Planar (120°)</option>
            <option value="AX2E">AX2E - Bent (< 120°)</option>
        </optgroup>
        <optgroup label="Tetrahedral (AX4)">
            <option value="AX4">AX4 - Tetrahedral (109.5°)</option>
            <option value="AX3E">AX3E - Trigonal Pyramidal (107°)</option>
            <option value="AX2E2">AX2E2 - Bent (104.5°)</option>
        </optgroup>
        <optgroup label="Trigonal Bipyramidal (AX5)">
            <option value="AX5">AX5 - Trigonal Bipyramidal</option>
            <option value="AX4E">AX4E - Seesaw</option>
            <option value="AX3E2">AX3E2 - T-Shaped</option>
            <option value="AX2E3">AX2E3 - Linear</option>
        </optgroup>
        <optgroup label="Octahedral (AX6)">
            <option value="AX6">AX6 - Octahedral (90°)</option>
            <option value="AX5E">AX5E - Square Pyramidal</option>
            <option value="AX4E2">AX4E2 - Square Planar</option>
        </optgroup>
    </select>

    <div class="info-box">
        <span class="label">اسم الشكل الهندسي:</span>
        <span id="shapeName" class="value">Linear</span>
    </div>
    <div class="info-box">
        <span class="label">الزاوية التقريبية:</span>
        <span id="angleText" class="value">180°</span>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    let scene, camera, renderer, group, stars;

    const DATA = {
        "AX2": { name: "Linear", angle: "180°", atoms: [[2,0,0], [-2,0,0]], color: 0x00f2fe },
        "AX3": { name: "Trigonal Planar", angle: "120°", atoms: [[2,0,0], [-1,1.73,0], [-1,-1.73,0]], color: 0x7cfc00 },
        "AX2E": { name: "Bent", angle: "< 120°", atoms: [[1.8,-1,0], [-1.8,-1,0]], color: 0xff00ff },
        "AX4": { name: "Tetrahedral", angle: "109.5°", atoms: [[0,2,0], [1.88,-0.66,0], [-0.94,-0.66,1.63], [-0.94,-0.66,-1.63]], color: 0x00ff87 },
        "AX3E": { name: "Trigonal Pyramidal", angle: "107°", atoms: [[1.88,-0.66,0], [-0.94,-0.66,1.63], [-0.94,-0.66,-1.63]], color: 0xffea00 },
        "AX2E2": { name: "Bent", angle: "104.5°", atoms: [[1.5,-1.2,0], [-1.5,-1.2,0]], color: 0xff4500 },
        "AX5": { name: "Trigonal Bipyramidal", angle: "90°, 120°", atoms: [[0,2,0], [0,-2,0], [1.5,0,0], [-0.75,0,1.3], [-0.75,0,-1.3]], color: 0x00bfff },
 "AX4E": { name: "Seesaw", angle: "90°, 117°", atoms: [[0,2,0], [0,-2,0], [1.5,0,0], [-1,0,1]], color: 0x9370db },
        "AX3E2": { name: "T-Shaped", angle: "90°", atoms: [[0,2,0], [0,-2,0], [1.5,0,0]], color: 0xff1493 },
        "AX2E3": { name: "Linear", angle: "180°", atoms: [[0,2,0], [0,-2,0]], color: 0x40e0d0 },
        "AX6": { name: "Octahedral", angle: "90°", atoms: [[2,0,0], [-2,0,0], [0,2,0], [0,-2,0], [0,0,2], [0,0,-2]], color: 0xffffff },
        "AX5E": { name: "Square Pyramidal", angle: "90°", atoms: [[0,-2,0], [1.5,0,1.5], [1.5,0,-1.5], [-1.5,0,1.5], [-1.5,0,-1.5]], color: 0xadff2f },
        "AX4E2": { name: "Square Planar", angle: "90°", atoms: [[1.5,0,1.5], [1.5,0,-1.5], [-1.5,0,1.5], [-1.5,0,-1.5]], color: 0x00ffff }
    };

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const pLight = new THREE.PointLight(0xffffff, 1.5, 50);
        pLight.position.set(5, 5, 5);
        scene.add(pLight);
        scene.add(new THREE.AmbientLight(0xffffff, 0.3));

        // نجوم في الخلفية
        const sGeo = new THREE.BufferGeometry();
        const sCount = 2000;
        const sPos = new Float32Array(sCount * 3);
        for(let i=0; i<sCount*3; i++) sPos[i] = (Math.random()-0.5)*200;
        sGeo.setAttribute('position', new THREE.BufferAttribute(sPos, 3));
        stars = new THREE.Points(sGeo, new THREE.PointsMaterial({color: 0x888888, size: 0.1}));
        scene.add(stars);

        group = new THREE.Group();
        scene.add(group);
        camera.position.z = 8;

        updateModel("AX2");
        animate();
    }

    function drawAtom(color, x, y, z, r) {
        const mesh = new THREE.Mesh(
            new THREE.SphereGeometry(r, 32, 32),
            new THREE.MeshPhongMaterial({ color: color, shininess: 100, emissive: color, emissiveIntensity: 0.2 })
        );
        mesh.position.set(x, y, z);
        group.add(mesh);
    }

    function drawBond(x, y, z) {
        const start = new THREE.Vector3(0,0,0);
        const end = new THREE.Vector3(x,y,z);
        const dist = start.distanceTo(end);
        const mesh = new THREE.Mesh(
            new THREE.CylinderGeometry(0.06, 0.06, dist, 16),
            new THREE.MeshPhongMaterial({ color: 0x555555, transparent: true, opacity: 0.6 })
        );
        mesh.position.copy(start.clone().lerp(end, 0.5));
        mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), end.clone().normalize());
        group.add(mesh);
    }

    function updateModel(key) {
        group.clear();
        const d = DATA[key];
        drawAtom(0xffffff, 0, 0, 0, 0.6); // الذرة المركزية
        d.atoms.forEach(a => {
            drawAtom(d.color, ...a, 0.4);
            drawBond(...a);
        });
        document.getElementById("shapeName").innerText = d.name;
        document.getElementById("angleText").innerText = d.angle;
    }

    document.getElementById("molSelect").onchange = (e) => updateModel(e.target.value);

    function animate() {
        requestAnimationFrame(animate);
        group.rotation.y += 0.005;
        group.rotation.x += 0.003;
        stars.rotation.y += 0.0005;
        renderer.render(scene, camera);
    }

    init();
    window.onresize = () => {
        camera.aspect = window.innerWidth/window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    };
</script>
</body>
</html>
