<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    let scene, camera, renderer, moleculeGroup, stars;

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // إضافة إضاءة سينمائية
        const light1 = new THREE.PointLight(0x00f2fe, 1, 100);
        light1.position.set(5, 5, 5);
        scene.add(light1);
        const light2 = new THREE.PointLight(0xff00ff, 1, 100);
        light2.position.set(-5, -5, 5);
        scene.add(light2);
        scene.add(new THREE.AmbientLight(0xffffff, 0.2));

        // إضافة خلفية نجوم (Stars)
        const starGeo = new THREE.BufferGeometry();
        const starCount = 1000;
        const posArray = new Float32Array(starCount * 3);
        for(let i=0; i<starCount*3; i++) posArray[i] = (Math.random() - 0.5) * 100;
        starGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        stars = new THREE.Points(starGeo, new THREE.PointsMaterial({color: 0xffffff, size: 0.05}));
        scene.add(stars);

        moleculeGroup = new THREE.Group();
        scene.add(moleculeGroup);

        camera.position.z = 6;
        updateMolecule("linear");
        animate();
    }

    function createAtom(color, x, y, z, size, isCentral = false) {
        const geo = new THREE.SphereGeometry(size, 64, 64);
        const mat = new THREE.MeshPhongMaterial({ 
            color: color, 
            emissive: color, 
            emissiveIntensity: 0.3,
            shininess: 100 
        });
        const sphere = new THREE.Mesh(geo, mat);
        sphere.position.set(x, y, z);
        moleculeGroup.add(sphere);
    }

        const start = new THREE.Vector3(0, 0, 0);

        const bond = new THREE.Mesh(geo, mat);

    function updateMolecule(type) {
        moleculeGroup.clear();
        createAtom(0xffffff, 0, 0, 0, 0.6, true); // الكربون/الذرة المركزية (أبيض)

        const data = {
            linear: { atoms: [[2.2,0,0], [-2.2,0,0]], angle: "180°", axe: "AX2", color: 0x00f2fe },
            trigonal: { atoms: [[2,0,0], [-1,1.7,0], [-1,-1.7,0]], angle: "120°", axe: "AX3", color: 0x4facfe },
            tetrahedral: { atoms: [[0,2,0], [1.8,-0.6,0], [-0.9,-0.6,1.6], [-0.9,-0.6,-1.6]], angle: "109.5°", axe: "AX4", color: 0x00ff87 },
            bent: { atoms: [[1.5,-1,0], [-1.5,-1,0]], angle: "104.5°", axe: "AX2E2", color: 0xff0055 },
            pyramidal: { atoms: [[1.5,-0.5,0], [-0.7,-0.5,1.3], [-0.7,-0.5,-1.3]], angle: "107°", axe: "AX3E", color: 0xfccb90 }
        };

        const config = data[type];
        config.atoms.forEach(pos => {
            createAtom(config.color, ...pos, 0.45);
            createBond(...pos);
        });

        document.getElementById("angle").innerText = config.angle;
        document.getElementById("type").innerText = config.axe;
    }

    document.getElementById("moleculeSelect").addEventListener("change", (e) => updateMolecule(e.target.value));

    function animate() {
        requestAnimationFrame(animate);
        moleculeGroup.rotation.y += 0.005;
        stars.rotation.y -= 0.001;
        renderer.render(scene, camera);
    }

    init();
</script>
